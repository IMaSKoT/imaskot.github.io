site_name: Портфолио
site_url: https://imaskot.github.io/


theme:
  name: material
  language: ru
  palette:
    scheme: slate
    primary: black
    accent: deep-orange
  features:
    - navigation.tabs
    - header.autohide
    - content.code.copy


nav:
  - Обо мне: index.md
  - Лабораторные работы:
      - Введение: projects.md
      - Лабораторная 1: lab1.md
      - Лабораторная 2: lab2.md
      - Лабораторная 3: lab3.md
      - Лабораторная 4: lab4.md
      - Лабораторная 5: lab5.md
      - Лабораторная 6: lab6.md
      - Лабораторная 7: lab7.md
      - Лабораторная 8: lab8.md
      - Лабораторная 9: lab9.md
  - Контакты: contact.md

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
copyright: Copyright &copy; 2026 Максим Седов