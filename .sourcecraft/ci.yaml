on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-and-publish-site
        cubes:
          - name: build-and-deploy-mkdocs
            image: docker.io/library/python:3.13
            script:
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"

              - cd source
              - mkdocs build -d ../docs
              - cd ..
              - echo "Сайт собран в корневой папке docs"

              - git config --global user.name "Yandex SourceCraft CI"
              - git config --global user.email "ci@yandex.ru"

              - git checkout -B release

              - git add docs -f
              - "git commit -m \"feat: автоматическая сборка сайта\" || echo \"Нет изменений для коммита\""

              - "git push origin release -f"
